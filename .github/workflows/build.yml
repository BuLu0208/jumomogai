name: Build TrollStore

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      # ========== 缓存：Homebrew 依赖 ==========
      - name: Cache Homebrew
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-deps-v4-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: brew-deps-v4-

      # ========== 缓存：Theos + iOS SDK ==========
      - name: Cache Theos
        uses: actions/cache@v4
        with:
          path: ~/theos
          key: theos-v5-${{ hashFiles('.github/workflows/build.yml') }}

      # ========== 缓存：fastPathSign 编译产物 ==========
      - name: Cache fastPathSign
        uses: actions/cache@v4
        with:
          path: ./Exploits/fastPathSign/fastPathSign
          key: fps-v3-${{ hashFiles('Exploits/fastPathSign/Makefile', 'ChOma/Makefile') }}

      # ========== 安装 Homebrew 依赖 ==========
      - name: Install dependencies
        run: |
          brew install openssl@3 libarchive pkg-config || true
          # 用 Procursus 版 ldid（支持 -s -K 组合，brew 版不支持）
          if [ ! -f "/usr/local/bin/ldid" ] || ! ldid -s -K/dev/null 2>/dev/null; then
            chmod +x ldid_procursus
            cp ldid_procursus /usr/local/bin/ldid
            echo "Installed Procursus ldid $(ldid 2>&1 | head -1)"
          fi

      # ========== 安装 Theos + iOS SDK ==========
      - name: Setup Theos
        run: |
          export THEOS=~/theos
          if [ ! -d "$THEOS/bin" ]; then
            echo "Cloning Theos..."
            git clone --recursive https://github.com/theos/theos.git "$THEOS"
          else
            echo "Theos 已缓存，跳过 clone"
          fi
          # 下载 theos/sdks（包含私有框架，Xcode 15+ 已移除）
          if [ ! -d "$THEOS/sdks/iPhoneOS16.5.sdk" ]; then
            echo "Downloading iOS SDK from theos/sdks..."
            curl -sL "https://github.com/theos/sdks/archive/master.zip" -o /tmp/sdks.zip
            unzip -qo /tmp/sdks.zip -d /tmp
            mkdir -p "$THEOS/sdks"
            cp -R /tmp/sdks-master/iPhoneOS16.5.sdk "$THEOS/sdks/" 2>/dev/null || {
              echo "Specific SDK not found, copying all..."
              cp -R /tmp/sdks-master/*.sdk "$THEOS/sdks/" 2>/dev/null || true
            }
            rm -rf /tmp/sdks-master /tmp/sdks.zip
          else
            echo "SDK 已缓存"
          fi
          # 同时用 Xcode SDK 做编译头文件后备（以防 theos/sdks 不全）
          XCODE_SDK=$(xcrun --sdk iphoneos --show-sdk-path 2>/dev/null)
          if [ -n "$XCODE_SDK" ] && [ -d "$XCODE_SDK" ]; then
            ln -sfn "$XCODE_SDK" "$THEOS/sdks/iPhoneOS17.5.sdk" 2>/dev/null || true
          fi
          echo "SDK 目录:"
          ls "$THEOS/sdks/" 2>/dev/null
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "PATH=$THEOS/bin:$PATH" >> $GITHUB_ENV

      # ========== 编译 fastPathSign（依赖 ChOma） ==========
      - name: Build fastPathSign
        run: |
          if [ ! -f "./Exploits/fastPathSign/fastPathSign" ]; then
            echo "编译 fastPathSign..."
            make -C Exploits/fastPathSign
            echo "fastPathSign 编译完成"
            ls -lh Exploits/fastPathSign/fastPathSign
          else
            echo "fastPathSign 已缓存，跳过编译"
          fi

      # ========== 生成 Victim 证书 ==========
      - name: Generate victim certificate
        run: |
          cd Victim
          chmod +x make_cert.sh
          mkdir -p /tmp/ipa_check
          unzip -q InstallerVictim.ipa -d /tmp/ipa_check
          APP_DIR=$(find /tmp/ipa_check/Payload -maxdepth 1 -type d -mindepth 1 | head -1)
          BINARY_NAME=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$APP_DIR/Info.plist")
          TEAM_ID=$(codesign -dvv "$APP_DIR/$BINARY_NAME" 2>&1 | grep "TeamIdentifier" | awk '{print $NF}')
          echo "Victim Team ID: $TEAM_ID"
          export PATH="$(brew --prefix openssl@3)/bin:$PATH"
          ./make_cert.sh "$TEAM_ID"
          echo "证书生成完成"
          ls -lh victim.p12

      # ========== make_roothelper ==========
      - name: Build RootHelper (trollstorehelper)
        run: |
          make -C RootHelper DEBUG=0
          echo "RootHelper 编译完成"
          ls -lh RootHelper/.theos/obj/trollstorehelper

      # ========== make_trollstore ==========
      - name: Build TrollStore.app
        run: |
          make -C TrollStore FINALPACKAGE=1
          echo "TrollStore.app 编译完成"
          ls TrollStore/.theos/obj/TrollStore.app/

      # ========== make_trollhelper_package ==========
      - name: Build TrollHelper (package mode)
        run: |
          mkdir -p _build
          cp RootHelper/.theos/obj/trollstorehelper TrollHelper/Resources/trollstorehelper
          # 1. rootful deb (arm64)
          make -C TrollHelper FINALPACKAGE=1 clean package
          cp TrollHelper/packages/*.deb _build/ 2>/dev/null
          echo "=== rootful deb ==="
          ls -lh TrollHelper/packages/*.deb 2>/dev/null || echo "none"
          # 2. rootless deb (arm64)
          make -C TrollHelper FINALPACKAGE=1 clean
          make -C TrollHelper THEOS_PACKAGE_SCHEME=rootless FINALPACKAGE=1 package
          cp TrollHelper/packages/*.deb _build/ 2>/dev/null
          echo "=== rootless deb ==="
          ls -lh TrollHelper/packages/*.deb 2>/dev/null || echo "none"
          rm TrollHelper/Resources/trollstorehelper
          echo "=== all debs in _build ==="
          ls -lh _build/*.deb 2>/dev/null || echo "none"

      # ========== make_trollhelper_embedded ==========
      - name: Build PersistenceHelper (3 variants)
        run: |
          mkdir -p _build
          # 1. 标准 arm64
          make -C TrollHelper clean
          make -C TrollHelper FINALPACKAGE=1 EMBEDDED_ROOT_HELPER=1
          cp TrollHelper/.theos/obj/TrollStorePersistenceHelper.app/TrollStorePersistenceHelper _build/PersistenceHelper_Embedded
          # 2. Legacy arm64 (iOS 15)
          make -C TrollHelper clean
          make -C TrollHelper FINALPACKAGE=1 EMBEDDED_ROOT_HELPER=1 LEGACY_CT_BUG=1
          cp TrollHelper/.theos/obj/TrollStorePersistenceHelper.app/TrollStorePersistenceHelper _build/PersistenceHelper_Embedded_Legacy_arm64
          # 3. Legacy arm64e
          make -C TrollHelper clean
          make -C TrollHelper FINALPACKAGE=1 EMBEDDED_ROOT_HELPER=1 CUSTOM_ARCHS=arm64e
          cp TrollHelper/.theos/obj/TrollStorePersistenceHelper.app/TrollStorePersistenceHelper _build/PersistenceHelper_Embedded_Legacy_arm64e
          make -C TrollHelper clean
          echo "所有 PersistenceHelper 编译完成"
          ls -lh _build/PersistenceHelper_*

      # ========== assemble_trollstore ==========
      - name: Assemble TrollStore.tar
        run: |
          cp RootHelper/.theos/obj/trollstorehelper TrollStore/.theos/obj/TrollStore.app/trollstorehelper
          cp _build/PersistenceHelper_Embedded TrollStore/.theos/obj/TrollStore.app/PersistenceHelper
          export COPYFILE_DISABLE=1
          tar -czvf _build/TrollStore.tar -C TrollStore/.theos/obj TrollStore.app
          echo "TrollStore.tar 打包完成"
          ls -lh _build/TrollStore.tar

      # ========== 编译 Pwnify ==========
      - name: Build Pwnify
        run: |
          make -C Pwnify
          echo "Pwnify 编译完成"
          ls -lh Pwnify/pwnify

      # ========== build_installer15 ==========
      - name: Build TrollHelperOTA iOS15 (arm64)
        run: |
          mkdir -p _build/tmp15
          unzip Victim/InstallerVictim.ipa -d _build/tmp15
          cp _build/PersistenceHelper_Embedded_Legacy_arm64 _build/TrollStorePersistenceHelperToInject
          ./Pwnify/pwnify set-cpusubtype _build/TrollStorePersistenceHelperToInject 1
          ldid -s -K./Victim/victim.p12 _build/TrollStorePersistenceHelperToInject
          cd _build/tmp15
          APP_PATH=$(find Payload -name "*" -depth 1)
          APP_NAME=$(basename "$APP_PATH")
          BINARY_NAME=$(echo "$APP_NAME" | cut -f 1 -d '.')
          echo "Inject into: $APP_NAME/$BINARY_NAME"
          cd ../..
          ./Pwnify/pwnify pwn "_build/tmp15/Payload/$APP_NAME/$BINARY_NAME" _build/TrollStorePersistenceHelperToInject
          cd _build/tmp15 && zip -vrD ../../_build/TrollHelper_iOS15.ipa * && cd ../..
          rm _build/TrollStorePersistenceHelperToInject
          rm -rf _build/tmp15
          echo "TrollHelper_iOS15.ipa 完成"
          ls -lh _build/TrollHelper_iOS15.ipa

      # ========== build_installer64e ==========
      - name: Build TrollHelperOTA arm64e
        run: |
          mkdir -p _build/tmp64e
          unzip Victim/InstallerVictim.ipa -d _build/tmp64e
          cd _build/tmp64e
          APP_PATH=$(find Payload -name "*" -depth 1)
          APP_NAME=$(basename "$APP_PATH")
          BINARY_NAME=$(echo "$APP_NAME" | cut -f 1 -d '.')
          echo "Inject into: $APP_NAME/$BINARY_NAME"
          cd ../..
          ./Pwnify/pwnify pwn64e "_build/tmp64e/Payload/$APP_NAME/$BINARY_NAME" _build/PersistenceHelper_Embedded_Legacy_arm64e
          cd _build/tmp64e && zip -vrD ../../_build/TrollHelper_arm64e.ipa * && cd ../..
          rm -rf _build/tmp64e
          echo "TrollHelper_arm64e.ipa 完成"
          ls -lh _build/TrollHelper_arm64e.ipa

      # ========== 上传产物 ==========
      - name: Upload TrollStore.tar
        uses: actions/upload-artifact@v4
        with:
          name: TrollStore-tar
          path: _build/TrollStore.tar
          retention-days: 7

      - name: Upload TrollHelperOTA IPAs
        uses: actions/upload-artifact@v4
        with:
          name: TrollHelperOTA-IPAs
          path: |
            _build/TrollHelper_iOS15.ipa
            _build/TrollHelper_arm64e.ipa
          retention-days: 7

      - name: Upload PersistenceHelper binaries
        uses: actions/upload-artifact@v4
        with:
          name: PersistenceHelper-binaries
          path: |
            _build/PersistenceHelper_Embedded
            _build/PersistenceHelper_Embedded_Legacy_arm64
            _build/PersistenceHelper_Embedded_Legacy_arm64e
          retention-days: 7

      - name: Upload deb packages
        uses: actions/upload-artifact@v4
        with:
          name: TrollHelper-debs
          path: _build/*.deb
          retention-days: 7

      # ========== 发布到 GitHub Release ==========
      - name: Update tag to latest commit
        run: |
          git tag -f v2.1.1-custom
          git push -f origin v2.1.1-custom

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.1.1-custom
          name: TrollStore 2.1.1 汉化定制版
          body: |
            基于 [opa334/TrollStore](https://github.com/opa334/TrollStore) 2.1.1 修改
            
            - 🇨🇳 全中文界面
            - 修改人：冷夜 | 微信：BuLu-0208
            
            **文件说明：**
            - `TrollStore.tar` — 持久性助手安装包（通过 CF 代理下载）
            - `TrollHelper_iOS15.ipa` — TrollHelperOTA (arm64, iOS 15 兼容)
            - `TrollHelper_arm64e.ipa` — TrollHelperOTA (arm64e)
            - `*.deb` — 越狱插件包（Dopamine/无根越狱安装用）
          files: |
            _build/TrollStore.tar
            _build/TrollHelper_iOS15.ipa
            _build/TrollHelper_arm64e.ipa
            _build/*.deb
            ldid
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
